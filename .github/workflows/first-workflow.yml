name: first workflow
on:
  # workflow_dispatch:
  #   inputs:
  #     versionName:
  #       required: true
  #       description: "this is version name for github workflow"
  # repository_dispatch:
  #   types: [test]

  push:
    # branches:
    #   - "main"
    # paths:
    #   - "feat/**"
  # pull_request:
  #   branches-ignore:
  #   -"feature/**"
jobs:
  first-workflow-job:
    name: first job
    runs-on: ubuntu-latest
    container:
      image: node
    steps:
      - name: check node version
        run: node -v
      - name: before checkout actions
        if: github.ref == 'refs/head/feature'
        run: ls
        shell: bash
      
      - name: checkout steps
        uses: actions/checkout@v4
      
      - name: after checkout actions
        if: github.event.inputs.versionName == 'test'
        run: ls
        shell: bash
