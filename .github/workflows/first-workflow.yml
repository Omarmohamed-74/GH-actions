name: first workflow
on:
  repository_dispatch:
  types: [test]

  push:
    branches:
      - "main"
jobs:
  first-workflow-job:
    name: first job
    runs-on: ubuntu-latest
    steps:
      - name: before checkout actions
        run: ls
        shell: bash
      
      - name: checkout steps
        uses: actions/checkout@v4
      
      - name: after checkout actions
        run: ls
        shell: bash
